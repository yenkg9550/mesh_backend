name: Deploy to EC2

on:
  push:
    branches:
      - main  # 只有 push 到 main 才觸發

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH 進 EC2 並更新程式碼
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/mesh_backend
            git pull origin main
            npm install
            npm run build
            pm2 restart mesh-server
